name: shellty-lingo

services:
  postgres:
    image: postgres:17.7-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shellty_lingo}
      POSTGRES_USER: ${POSTGRES_USER:-shellty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_shellty_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - shellty_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  shellty_postgres_data:
